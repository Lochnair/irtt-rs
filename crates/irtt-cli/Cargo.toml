[package]
name = "irtt-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = ["stats"]
stats = ["dep:irtt-stats"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
ctrlc = "3.4"
irtt-client.workspace = true
irtt-proto.workspace = true
irtt-stats = { workspace = true, optional = true }
